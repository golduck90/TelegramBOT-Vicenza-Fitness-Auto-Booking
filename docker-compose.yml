version: "3.9"
services:
  bot-palestra:
    build: .
    container_name: vicenza-fitness-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - WELLTEAM_APP_TOKEN=${WELLTEAM_APP_TOKEN}
      - LOG_LEVEL=INFO
    volumes:
      - palestra_data:/app
    # Nessuna healthcheck HTTP — il bot non espone porte

volumes:
  palestra_data:
